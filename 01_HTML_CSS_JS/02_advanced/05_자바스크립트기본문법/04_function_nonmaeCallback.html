<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function callNumTimes(num, callback) {
        for (let i = 0; i < num; i++) callback();
      }

      callNumTimes(10, function () {
        alert('함수호출');
      });
    </script>
  </head>

  <body></body>
</html>
