<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* table 태그 안에 tbody 태그가 자동으로 생성되기 때문에 이를 적어줘야 스타일이 적용된다. */
      table > tbody > tr > th {
        color: red;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>이름</th>
        <th>지역</th>
      </tr>
      <tr>
        <td>김동현</td>
        <td>서울</td>
      </tr>
    </table>
  </body>
</html>
