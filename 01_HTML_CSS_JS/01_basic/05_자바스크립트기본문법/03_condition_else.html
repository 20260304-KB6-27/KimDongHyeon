<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // let 일반적인 변수
      // const 상수 (값이 변경되면 안될때)
      let date = new Date();
      if (date.getHours() >= 12) alert('오후입니다.');
      else alert('오전입니다.');
    </script>
  </head>
  <body></body>
</html>
